name: Eleventy Build

on:
  push:
    branches:
      - main          # Changed from master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4   # Updated to v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'        # Modern Node

      - run: npm ci

      - run: npm run build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4   # Updated
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}   # Prefer this over PERSONAL_TOKEN
          publish_dir: ./docs                       # <-- THIS WAS THE MAIN PROBLEM